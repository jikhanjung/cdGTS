# 로컬(빌드 호스트)에서 이미지 빌드 + 실행 테스트.
#   cd deploy && docker compose -f docker-compose.dev.yml up --build
# 실제 /srv/cdGTS 운영 실행은 deploy/host/docker-compose.yml (이미지 pull) 사용.
services:
  cdgts:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: honestjung/cdgts:latest
    ports:
      - "8011:8000"
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    env_file:
      - .env
    restart: unless-stopped

  # 비동기 평가 워커 (P06.4a) — 로컬 빌드 검증용.
  worker:
    image: honestjung/cdgts:latest
    command: python manage.py run_worker
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - cdgts
