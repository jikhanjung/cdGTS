<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="refresh" content="10">
<title>Updating · cdGTS</title>
<style>
  :root {
    --navy: #24435c; --accent: #b5651d; --gold: #d9a441;
    --bg: #f4f5f7; --card: #fff; --ink: #1d2733; --muted: #6b7686; --line: #e4e7ec;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px env(safe-area-inset-right) 24px env(safe-area-inset-left); text-align: center;
  }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    box-shadow: 0 8px 30px rgba(36,67,92,.10);
    max-width: 380px; width: 100%; padding: 32px 26px;
  }
  .brand { color: var(--navy); font-size: 22px; font-weight: 800; letter-spacing: .3px; }
  .brand-sub { color: var(--accent); font-size: 12px; font-weight: 700; margin-top: 2px;
    text-transform: uppercase; letter-spacing: 1.2px; }
  .spinner {
    width: 44px; height: 44px; margin: 26px auto 22px;
    border: 4px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 19px; margin: 0 0 8px; color: var(--ink); }
  p { font-size: 14px; line-height: 1.5; color: var(--muted); margin: 0; }
  .ko { margin-top: 10px; font-size: 13px; color: var(--muted); }
  .foot { margin-top: 22px; font-size: 12px; color: var(--muted); }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0b1622; --card:#13202f; --ink:#e8edf3; --muted:#90a0b4; --line:#243446; }
    .spinner { border-color: #243446; border-top-color: var(--accent); }
  }
</style>
</head>
<body>
  <main class="card">
    <div class="brand">cdGTS</div>
    <div class="brand-sub">Continuously Deployed Geologic Time Scale</div>
    <div class="spinner" role="status" aria-label="Updating"></div>
    <h1>We'll be right back</h1>
    <p>A new version is being deployed and the service will return in a few moments. This page refreshes automatically.</p>
    <p class="ko">새 버전을 배포하고 있습니다. 잠시 후 자동으로 연결됩니다.</p>
    <div class="foot">cdGTS · continuously deployed geologic time scale</div>
  </main>
</body>
</html>
