# /srv/cdGTS/docker-compose.yml — 운영/테스트 호스트 실행 (이미지 pull).
# 개발/테스트 서버와 프로덕션 서버 모두 이 파일로 /srv/cdGTS 에서 실행.
# IMAGE_TAG 는 /srv/cdGTS/.env 에서 온다 (deploy.sh 가 갱신).
services:
  cdgts:
    image: honestjung/cdgts:${IMAGE_TAG}
    container_name: cdgts
    ports:
      # 기본 127.0.0.1(리버스 프록시 뒤). 호스트 8011 → 컨테이너 8000 (8010은 strati2026 사용).
      # dev(m710q)는 /srv/cdGTS/.env 에 HTTP_BIND=0.0.0.0 으로 LAN/tailscale 직접 접근 허용.
      # prod(dolfinid)는 미설정(127.0.0.1 유지) — 공인 IP 직접 노출 금지, nginx 경유만.
      - "${HTTP_BIND:-127.0.0.1}:8011:8000"
    volumes:
      # WAL 을 위해 파일이 아닌 *디렉터리* 를 마운트 — web·worker 가 -wal/-shm 형제 파일을
      # 공유해야 서로의 커밋을 본다(파일만 마운트하면 컨테이너별 사설 WAL 로 갈라짐).
      # **DB 전용 db/ 서브디렉터리만** 마운트(0.1.64~) — 컨테이너가 .env·backup·배포 스크립트를 못 보게
      # blast radius 축소. host DB 위치=/srv/cdGTS/db/db.sqlite3, 컨테이너 DATABASE_PATH=/app/hostdb/db.sqlite3.
      - /srv/cdGTS/db:/app/hostdb
    env_file:
      - /srv/cdGTS/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # 비동기 평가 워커 (P06.4a) — web 과 같은 이미지·DB, queued EvalJob 폴링.
  # web 이 migrate 를 마친 뒤 잡을 처리(스키마 미완이면 크래시→restart 로 재시도).
  worker:
    image: honestjung/cdgts:${IMAGE_TAG}
    container_name: cdgts-worker
    command: python manage.py run_worker
    volumes:
      # WAL 을 위해 파일이 아닌 *디렉터리* 를 마운트 — web·worker 가 -wal/-shm 형제 파일을
      # 공유해야 서로의 커밋을 본다(파일만 마운트하면 컨테이너별 사설 WAL 로 갈라짐).
      # **DB 전용 db/ 서브디렉터리만** 마운트(0.1.64~) — 컨테이너가 .env·backup·배포 스크립트를 못 보게
      # blast radius 축소. host DB 위치=/srv/cdGTS/db/db.sqlite3, 컨테이너 DATABASE_PATH=/app/hostdb/db.sqlite3.
      - /srv/cdGTS/db:/app/hostdb
    env_file:
      - /srv/cdGTS/.env
    restart: unless-stopped
    depends_on:
      - cdgts
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
