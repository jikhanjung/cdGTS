# /srv/cdGTS/docker-compose.yml — 운영/테스트 호스트 실행 (이미지 pull).
# 개발/테스트 서버와 프로덕션 서버 모두 이 파일로 /srv/cdGTS 에서 실행.
# IMAGE_TAG 는 /srv/cdGTS/.env 에서 온다 (deploy.sh 가 갱신).
services:
  cdgts:
    image: honestjung/cdgts:${IMAGE_TAG}
    container_name: cdgts
    ports:
      - "127.0.0.1:8011:8000"     # 리버스 프록시(nginx) 뒤. 호스트 8011 → 컨테이너 8000
    volumes:
      - /srv/cdGTS/db.sqlite3:/app/db.sqlite3
    env_file:
      - /srv/cdGTS/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
