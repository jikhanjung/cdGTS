# /etc/nginx/sites-available/cdgts — cdGTS 리버스 프록시 (strati2026 패턴 참고)
# 컨테이너는 127.0.0.1:8011 에만 노출. static/media 는 앱(WhiteNoise)이 직접 서빙.
# 최초 설치 후 `certbot --nginx -d cdgts.paleobytes.info` 가 443 ssl 블록 + 80→443 리다이렉트를 자동 추가.
server {
    listen 80;
    server_name cdgts.paleobytes.info;
    client_max_body_size 16M;
    charset utf-8;

    location / {
        include proxy_params;
        proxy_pass http://127.0.0.1:8011;
    }

    # docker 스왑/백엔드 다운 시 점검 페이지 (502/503/504 → maintenance.html, HTTP 503 유지)
    error_page 502 503 504 =503 /maintenance.html;
    location = /maintenance.html {
        root /srv/cdGTS;
        internal;
        add_header Retry-After 10 always;
        add_header Cache-Control "no-store, must-revalidate" always;
    }
}
